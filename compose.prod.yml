services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: budget-manager-api:local
    container_name: budget-manager-api-local
    restart: unless-stopped
    env_file:
      - ${BUDGET_MANAGER_API_ENV_FILE:-/home/victor/.config/budget-manager-api/prod.env}
    volumes:
      - ${BUDGET_MANAGER_API_PRIVATE_KEY:-/home/victor/bm-private.pem}:/run/secrets/bm-private.pem:ro
      - ${BUDGET_MANAGER_API_PUBLIC_KEY:-/home/victor/bm-public.pem}:/run/secrets/bm-public.pem:ro
    ports:
      - "${BUDGET_MANAGER_API_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
