$kind: http-request
name: Create Subscription
url: "{{baseUrl}}/subscriptions"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "description": "T-02 Subscription",
      "amount": 200.00,
      "currency": "BRL"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 201", function () {
        pm.response.to.have.status(201);
      });

      var id = pm.response.json().id;
      pm.collectionVariables.set("subscriptionId", id);
    language: text/javascript
order: 1776118290000
