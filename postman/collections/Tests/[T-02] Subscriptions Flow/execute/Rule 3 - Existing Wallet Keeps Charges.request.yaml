$kind: http-request
name: Rule 3 - Existing Wallet Keeps Charges
url: "{{baseUrl}}/wallets/{{walletId}}/subscription-charges"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });

      pm.test("Existing wallet keeps materialized subscription charge", function () {
        var charges = pm.response.json();
        pm.expect(charges).to.have.length(1);
        pm.expect(charges[0].amount).to.eql(200.00);
      });
    language: text/javascript
order: 1776118297000
