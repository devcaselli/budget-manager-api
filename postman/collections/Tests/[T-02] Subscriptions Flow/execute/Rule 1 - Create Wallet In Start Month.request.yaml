$kind: http-request
name: Rule 1 - Create Wallet In Start Month
url: "{{baseUrl}}/wallets"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "description": "T-02 in subscription month",
      "budget": 1000.00,
      "startDate": "2026-05-01",
      "closedDate": null,
      "closed": false
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 201", function () {
        pm.response.to.have.status(201);
      });

      var body = pm.response.json();
      pm.collectionVariables.set("walletId", body.id);
      pm.test("Wallet remaining was debited by subscription", function () {
        pm.expect(body.remaining).to.eql(800.00);
      });
    language: text/javascript
order: 1776118293000
