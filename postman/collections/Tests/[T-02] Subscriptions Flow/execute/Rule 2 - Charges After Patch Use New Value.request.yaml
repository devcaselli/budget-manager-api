$kind: http-request
name: Rule 2 - Charges After Patch Use New Value
url: "{{baseUrl}}/wallets/{{walletAfterPatchId}}/subscription-charges"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });

      pm.test("New materialized charge uses patched amount", function () {
        var charges = pm.response.json();
        pm.expect(charges).to.have.length(1);
        pm.expect(charges[0].amount).to.eql(150.00);
      });
    language: text/javascript
order: 1776118295300
