$kind: http-request
name: List Expenses By Wallet
url: "{{baseUrl}}/expenses/wallet/{{walletId}}?page=0&size=20"
method: GET
queryParams:
  page: "0"
  size: "20"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });
    language: text/javascript
