$kind: http-request
name: Create Expense
method: POST
url: "{{baseUrl}}/expenses"
order: 1775858089630
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "{{$randomProduct}}",
      "cost": {{$randomPrice}},
      "purchaseDate": "2026-04-10",
      "walletId": "674c165a-73f1-4d3b-8527-5e9392bcc25e"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 201", function () {
        pm.response.to.have.status(201);
      });
    language: text/javascript
