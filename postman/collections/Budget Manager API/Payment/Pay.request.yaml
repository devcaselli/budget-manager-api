$kind: http-request
name: Pay
method: POST
url: '{{baseUrl}}/pay'
order: 1775858120000
queryParams:
  - key: walletId
    value: '{{walletId}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "payment": {
        "amount": 10.5,
        "paymentDate": "2026-04-13T12:00:00Z",
        "details": "Sample payment"
      },
      "bulletId": "{{bulletId}}",
      "expenseId": "{{expenseId}}"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 204", function () {
        pm.response.to.have.status(204);
      });
    language: text/javascript
