apiVersion: v1
kind: Secret
metadata:
  name: manager-api-secret
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  {{- range $key, $val := .Values.managerApi.secrets }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
  bm-private.pem: {{ .Values.managerApi.rsaSecrets.privateKey | b64dec | quote }}
  bm-public.pem: {{ .Values.managerApi.rsaSecrets.publicKey | b64dec | quote }}
