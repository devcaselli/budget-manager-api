apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ingest-data
  namespace: {{ .Values.namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.ingestApi.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.ingestApi.persistence.size }}
