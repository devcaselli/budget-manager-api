namespace: budget

managerApi:
  image:
    repository: budget-manager-api
    tag: local
    pullPolicy: Never  # minikube image load
  replicas: 1
  port: 8080
  env:
    SPRING_PROFILES_ACTIVE: prod
    APP_CORS_ALLOWED_ORIGINS: "http://localhost:3000"
    APP_JWT_ISSUER: budgetmanager-api
    APP_JWT_AUDIENCES: budgetmanager-api
    APP_JWT_EXPIRATION_SECONDS: "900"
    APP_JWT_REFRESH_EXPIRATION_SECONDS: "604800"
    APP_JWT_PUBLIC_KEY_PATH: /run/secrets/bm-public.pem
    APP_JWT_PRIVATE_KEY_PATH: /run/secrets/bm-private.pem
    APP_RATE_LIMIT_ENABLED: "true"
    APP_SECURITY_ENABLED: "true"
    APP_SYNC_INGEST_CRON_ENABLED: "true"
    APP_SYNC_INGEST_CRON_EXPRESSION: "0 */15 22-23 * * *"
    APP_SYNC_INGEST_ACTIVE_WINDOW: "7"
  # Sensitive values — override in values-local.yaml or via --set, never commit real values
  secrets:
    MONGODB_URL: "CHANGE_ME"
    APP_SYNC_INGEST_URL: "http://budget-ingest-api:8081"
    APP_SYNC_INGEST_API_KEY: "CHANGE_ME"
  # RSA PEM files — base64-encoded, override in values-local.yaml
  rsaSecrets:
    privateKey: "CHANGE_ME_BASE64"
    publicKey: "CHANGE_ME_BASE64"

ingestApi:
  image:
    repository: budget-ingest-api
    tag: latest
    pullPolicy: Never  # minikube image load
  replicas: 1
  port: 8081
  secrets:
    API_KEY: "CHANGE_ME"
  env:
    PORT: "8081"
    DB_PATH: /data/ingest.db
    TEMPLATES_DIR: /app/templates
  persistence:
    size: 1Gi
    storageClass: standard

mongodb:
  image: mongo:7
  port: 27017
  persistence:
    size: 2Gi
    storageClass: standard
  auth:
    enabled: false  # local study only — enable for prod
