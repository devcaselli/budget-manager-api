apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: budget-manager
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/devcaselli/budget-manager-api
    targetRevision: HEAD
    path: k8s
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: budget
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
